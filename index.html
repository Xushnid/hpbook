  <script>
        const COUNT_URL = "https://api.countapi.xyz";
        const NAMESPACE = "yourdomain.com"; // O‘z domeningizni yoki loyiha nomini kiriting
        const KEY = "visits"; // Hisoblagich nomi
        const counter = document.getElementById("visit-count");

        // Joriy hisoblagich qiymatini olish
        const getCount = async () => {
            try {
                const response = await fetch(`${COUNT_URL}/get/${NAMESPACE}/${KEY}`);
                const data = await response.json();
                counter.innerText = data.value;
            } catch (error) {
                console.error("Error fetching count:", error);
            }
        };

        // Hisoblagichni oshirish
        const incrementCount = async () => {
            try {
                const response = await fetch(`${COUNT_URL}/hit/${NAMESPACE}/${KEY}`);
                const data = await response.json();
                counter.innerText = data.value;
            } catch (error) {
                console.error("Error incrementing count:", error);
            }
        };

        // Takroriy tashriflarni oldini olish uchun localStorage’dan foydalanish
        if (localStorage.getItem("hasVisited") === null) {
            incrementCount().then(() => {
                localStorage.setItem("hasVisited", "true");
            });
        } else {
            getCount();
        }
    </script>


    <script>

		/* === INDEX UCHUN SUZUVCHI IKONALAR ================================= */
document.addEventListener('DOMContentLoaded', () => {
    const wrap  = document.getElementById('hpBg');
    if(!wrap) return;

    const kinds = ['glasses','scar'];   // turdagi ikonalar
    const COUNT = 18;                  // nechta ikonacha bo‘ladi

    for(let i=0;i<COUNT;i++){
        const icon = document.createElement('span');
        icon.className = `hp-icon ${kinds[Math.random() < .5 ? 0 : 1]}`;

        // Tasodifiy joy → 0–100 %
        icon.style.top  = Math.random()*100 + '%';
        icon.style.left = Math.random()*100 + '%';

        // Boshlang‘ich burilish
        icon.style.transform = `translate(-50%,-50%) rotate(${Math.random()*360}deg)`;

        // Harakat davomiyligi va fazasini tasodifiy tanlash
        const dur   = 20 + Math.random()*15;  // 20-35 s
        const delay = -Math.random()*dur;     // yuklanish paytida “jonli” ko‘rinish
        icon.style.animation = `hp-drift ${dur}s linear ${delay}s infinite alternate`;

        wrap.appendChild(icon);
    }
});

    </script>
